<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Font weight</title>
    <style>
      .light {
        font-weight: 300;
      }

      .normal {
        font-weight: 400;
      }

      .bold {
        font-weight: 700;
      }

      .italic {
        font-style: italic;
      }
    </style>
  </head>

  <body>
    <p class="light">This is light text</p>
    <p class="normal">This is normal text</p>
    <p class="bold italic">This is bold text</p>
  </body>
</html>
