<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Line height & spacing</title>
    <style>
      .space {
        /*1.8 * font size */
        line-height: 1.8;
      }

      .letter-space {
        letter-spacing: 2px;
      }

      .word-space {
        word-spacing: 10px;
      }
    </style>
  </head>

  <body>
    <p class="space letter-space word-space">
      hello world hello world hello world hello world hello world hello world
      hello world hello world hello world hello world hello world hello world
      hello world hello world hello world hello world hello world hello world
      hello world hello world hello world
    </p>
  </body>
</html>
