<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Text align</title>
    <style>
      .left {
        text-align: left;
      }

      .center {
        text-align: center;
      }

      .right {
        text-align: right;
      }
    </style>
  </head>

  <body>
    <p class="left">Left alignment</p>
    <p class="center">Center alignment</p>
    <p class="right">Right alignment</p>
  </body>
</html>
