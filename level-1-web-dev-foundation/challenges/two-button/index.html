<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Two Buttons</title>
  <link href="styles.css" rel="stylesheet" />
  <script src="script.js"></script>
</head>

<body>
  <div class="page">
    <header>
      <h1>Two buttons</h1>
    </header>
    <main class="content">
      <div class="btn-area background">
        <div class="buttons">
          <p class="btn-txt" id="btn-2" contenteditable="true">
            Work With Claude
          </p>
          <div class="btn-square">
            <div class="btn-side">
              <div class="grey-circle"></div>
            </div>
            <div class="red-circle"></div>
            <div class="btn-side">
              <div class="grey-circle"></div>
            </div>
          </div>
        </div>
        <div class="buttons">
          <p class="btn-txt" id="btn-1" contenteditable="true">
            Work With Gemini
          </p>

          <div class="btn-square">
            <div class="btn-side">
              <div class="grey-circle"></div>
            </div>
            <div class="red-circle"></div>
            <div class="btn-side">
              <div class="grey-circle"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="background bottom">
        <img src="assets/sweaty_guy.jpg" alt="" class="bg-image" />
        <p class="img-text" id="img-text" contenteditable="true">
          New Web Devs
        </p>
      </div>
    </main>
  </div>
</body>

</html>
