<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Semantic Title</title>
  </head>

  <body>
    <header>
      <h1>My website</h1>
      <nav>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">Blog</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section>
        <h2>About us</h2>
        <p>We build websites, using semantics</p>
      </section>

      <article>
        <h2>Latest Blog Post</h2>
        <p>Understanding the importance of semantic HTML</p>
      </article>
      <aside>
        <h3>Sidebar stuff</h3>
        <p>Links to useful resources</p>
      </aside>
    </main>
    <footer>Copyright (c) 2026 Me. All Rights Reserved.</footer>
  </body>
</html>

<!--
  <header> Defines the top section of a webpage
  <nav> Is the navigation menu that usually links to other pages of the website
  <main> The primary chunk of content on the page
  <article> a container in a sense, such as a blog post
  <section> group of related content on a page
  <aside> content on the side of the page, such as advertisement
  <footer> Contains copyright and extra info
-->
