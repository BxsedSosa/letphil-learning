<!-- This declares the doc as html5 -->
<!doctype html>
<html>
  <head>
    <!-- Header holds the meta data of the website-->
    <meta charset="UTF-8" />
    <meta name="description" content="Learn HTML easily" />
    <meta name="keywords" content="HTML, CSS, Javascript" />
    <meta name="author" content="John Doe" />
    <title>First Webpage</title>
  </head>

  <body>
    <!-- Body holds all the visible data the is on the front end-->

    <!-- H tags are for Headers. The lower the numebr the bigger the text will be 
        h1 is the largest
        h6 is the smallest
      -->
    <h1>h1 Main Heading usually reserved for the top of the site</h1>
    <h2>h2 usually used for Sub headers</h2>
    <h3>So</h3>
    <h4>On</h4>
    <h5>So</h5>
    <h6>Forth</h6>
    <p>p tag paragraph tag for basic display of text</p>

    <!-- Div tag is a 'center division' tag which is like a lego block-->
    <div style="background-color: lightgrey; padding: 10px">
      <h3>Div section</h3>
      <p>This is a block level container using `< di v>`</p>
    </div>

    <!-- Span tag is a inline way to style a portion of a text element -->
    <p>
      This text contains a
      <span style="color: greenyellow">highlighted text</span> using a span tag
    </p>
  </body>
</html>
