<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pseudo Elements</title>
    <link href="css/style.css" rel="stylesheet" />
    <style>
      .quote:before {
        content: '"';
        font-size: 20px;
        color: green;
      }

      .quote:after {
        content: '"';
        font-size: 20px;
        color: red;
      }
    </style>
  </head>

  <body>
    <p class="quote">This is a quote.</p>
  </body>
</html>
